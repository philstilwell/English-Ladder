name: Daily ESL Lesson Generator

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cron.yml'
      - 'update_site.py'
      - 'requirements.txt'
      - 'tests/**'
      - 'styles.css'
      - 'app.js'
      - 'index.html'
  schedule:
    # Runs every day at 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the action permission to save files to your repo
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run checks
        run: |
          python -m py_compile update_site.py
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_site.py

      - name: Commit updated lesson pages
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add beginner.html intermediate.html advanced.html
          git commit -m "Auto-update daily lessons [skip ci]" || echo "No changes to commit"
          git push
