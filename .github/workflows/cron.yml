name: Daily ESL Lesson Generator

on:
  schedule:
    # Runs at 10:00 UTC (6:00 AM EST) every day
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub interface by clicking a button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser google-generativeai

      - name: Run update script
        env:
          STATIC_APP_KEY: ${{ secrets.STATIC_APP_KEY }}
          STATIC_SITE_ID: ${{ secrets.STATIC_SITE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_site.py