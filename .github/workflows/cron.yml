name: Daily ESL Lesson Generator

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cron.yml'
      - 'update_site.py'
      - 'requirements.txt'
      - 'tests/**'
      - 'styles.css'
      - 'app.js'
      - 'index.html'
  schedule:
    # Runs every day at 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:

concurrency:
  group: daily-esl-lesson-generator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the action permission to save files to your repo
      
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        continue-on-error: true

      - name: Fallback checkout
        if: steps.checkout.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "actions/checkout failed; attempting manual checkout fallback."
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          git init .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          for attempt in 1 2 3; do
            echo "Manual checkout attempt ${attempt}..."
            if git -c http.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" fetch --no-tags --depth=1 origin "${GITHUB_SHA}" \
              && git checkout --force -B "${GITHUB_REF_NAME}" FETCH_HEAD; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "Manual checkout fallback failed after 3 attempts." >&2
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run checks
        run: |
          python -m py_compile update_site.py
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_site.py

      - name: Commit updated lesson pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          lesson_snapshot="$(mktemp -d)"
          cp beginner.html intermediate.html advanced.html "${lesson_snapshot}/"

          for attempt in 1 2 3; do
            echo "Preparing lesson update push attempt ${attempt}..."
            git -c http.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            cp "${lesson_snapshot}/beginner.html" beginner.html
            cp "${lesson_snapshot}/intermediate.html" intermediate.html
            cp "${lesson_snapshot}/advanced.html" advanced.html

            git add beginner.html intermediate.html advanced.html
            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git commit -m "Auto-update daily lessons [skip ci]"
            if git -c http.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying after refreshing ${GITHUB_REF_NAME}..."
            sleep $((attempt * 5))
          done

          echo "Failed to push lesson update after 3 attempts." >&2
          exit 1
