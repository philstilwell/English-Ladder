name: Daily ESL Lesson Generator

on:
  schedule:
    # Runs at 12:00 UTC (8:00 AM EST) every day
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the action permission to save files to your repo
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser google-generativeai

      - name: Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_site.py

      - name: Commit updated index.html
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Auto-update daily lesson" || echo "No changes to commit"
          git push